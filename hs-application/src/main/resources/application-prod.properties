spring.application.name=hs-application

# security configuration
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
security.jwt.issuer=${JWT_ISSUER:healthsense-auth}
security.jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION}
security.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION}
security.jwt.key-id=${JWT_KEY_ID:healthsense-auth-prod-key}
security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:15m}
security.jwt.mobile-access-token-ttl=${JWT_MOBILE_ACCESS_TOKEN_TTL:30d}
security.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:7d}
security.cookie.secure=${COOKIE_SECURE:true}
security.cookie.same-site=${COOKIE_SAME_SITE:None}
security.cookie.path=${COOKIE_PATH:/api/auth}

# database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# rate limiter configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:10}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:5}

# snowflake id configuration
snowflake.worker-id=${SNOWFLAKE_WORKER_ID:1}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID:1}
