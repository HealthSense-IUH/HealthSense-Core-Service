spring.application.name=hs-application

# security configuration
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
security.jwt.issuer=${JWT_ISSUER:healthsense-auth}
security.jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION:classpath:keys/private.pem}
security.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}
security.jwt.key-id=${JWT_KEY_ID:healthsense-auth-dev-key}
security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:15m}
security.jwt.mobile-access-token-ttl=${JWT_MOBILE_ACCESS_TOKEN_TTL:9999d}
security.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:7d}
security.cookie.secure=${COOKIE_SECURE:false}
security.cookie.same-site=${COOKIE_SAME_SITE:Lax}
security.cookie.path=${COOKIE_PATH:/api/auth}

# database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthsense}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# rate limiter configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:10}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:5}

# snowflake id configuration
snowflake.worker-id=${SNOWFLAKE_WORKER_ID:1}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID:1}
