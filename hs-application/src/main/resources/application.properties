spring.application.name=hs-application
spring.profiles.default=dev

# security configuration
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
security.jwt.issuer=${JWT_ISSUER:healthsense-auth}
security.jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION:classpath:keys/private.pem}
security.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}
security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:15m}

# database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/healthsense
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
