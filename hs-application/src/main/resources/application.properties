spring.application.name=hs-application

# security configuration
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
security.jwt.issuer=${JWT_ISSUER}
security.jwt.private-key-location=${JWT_PRIVATE_KEY_LOCATION}
security.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION}
security.jwt.key-id=${JWT_KEY_ID}
security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL}
security.jwt.mobile-access-token-ttl=${JWT_MOBILE_ACCESS_TOKEN_TTL}
security.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL}
security.cookie.secure=${COOKIE_SECURE}
security.cookie.same-site=${COOKIE_SAME_SITE}
security.cookie.path=${COOKIE_PATH}

# database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL}

# redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# rate limiter configuration
app.rate-limit.enabled=${RATE_LIMIT_ENABLED}
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS}

# snowflake id configuration
snowflake.worker-id=${SNOWFLAKE_WORKER_ID}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID}
